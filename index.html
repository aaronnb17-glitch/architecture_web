<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ArcGIS Architecture</title>
</head>
<body>

<h1>ArcGIS Enterprise Architecture</h1>

<div class="tabs">
  <button onclick="showTab('prod')">Production</button>
  <button onclick="showTab('preprod')">Pre-Prod</button>
  <button onclick="showTab('dev')">Dev</button>
</div>

<div id="prod" class="tab active">
  <div class="diagram">

    <!-- LEFT SIDE -->
    <div class="node internet">🌐 Internet</div>
    <div class="node firewall">🔥 Firewall</div>

    <!-- MAIN STACK -->
    <div class="node web">Web Server<br>443</div>
    <div class="node portal">Portal<br>7443</div>
    <div class="node server">ArcGIS Server<br>6443</div>
    <div class="node datastore">DataStore<br>2443</div>
    <div class="node db">RDBMS</div>

    <!-- BOTTOM -->
    <div class="node nas">NAS</div>
    <div class="node vdi">VDI Machines</div>
    <div class="node users">Users</div>

    <!-- CONNECTION LINES -->
    <svg class="lines">
      <line x1="50" y1="120" x2="150" y2="120"/>
      <line x1="150" y1="120" x2="300" y2="120"/>
      <line x1="300" y1="120" x2="450" y2="120"/>
      <line x1="450" y1="120" x2="600" y2="120"/>
      <line x1="600" y1="120" x2="750" y2="120"/>

      <line x1="450" y1="120" x2="450" y2="250"/>
      <line x1="450" y1="250" x2="750" y2="250"/>
    </svg>

  </div>
</div>

<div id="preprod" class="tab">
  <div class="simple">Pre-Prod Environment (same structure)</div>
</div>

<div id="dev" class="tab">
  <div class="simple">Dev Environment (combined services)</div>
</div>


  <style>  body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

h1 {
  margin: 20px;
}

.tabs button {
  margin: 5px;
  padding: 10px 15px;
  background: #1e293b;
  color: white;
  border: none;
  cursor: pointer;
}

.tabs button:hover {
  background: #3b82f6;
}

.tab {
  display: none;
}

.tab.active {
  display: block;
}

.diagram {
  position: relative;
  width: 1000px;
  height: 400px;
  margin: auto;
}

.node {
  position: absolute;
  padding: 10px;
  border-radius: 10px;
  background: #1e293b;
  transition: 0.3s;
  cursor: pointer;
}

.node:hover {
  transform: scale(1.1);
  background: #10b981;
}

/* POSITIONING */

.internet { top: 100px; left: 20px; }
.firewall { top: 100px; left: 100px; }

.web { top: 100px; left: 250px; }
.portal { top: 100px; left: 400px; }
.server { top: 100px; left: 550px; }
.datastore { top: 100px; left: 700px; }
.db { top: 100px; left: 850px; }

.nas { top: 250px; left: 700px; }
.vdi { top: 250px; left: 450px; }
.users { top: 250px; left: 250px; }

.lines {
  position: absolute;
  width: 100%;
  height: 100%;
}

line {
  stroke: #3b82f6;
  stroke-width: 2;
  stroke-dasharray: 5;
  animation: dash 2s linear infinite;
}

@keyframes dash {
  to {
    stroke-dashoffset: -10;
  }
}

.simple {
  margin-top: 50px;
  font-size: 20px;
}</style>


<script>

function showTab(id) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

  
</script>
</body>
</html>
